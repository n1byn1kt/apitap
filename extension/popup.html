<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <h1>ApiTap</h1>
    <div class="tabs">
      <button class="tab active" data-tab="capture">Capture</button>
      <button class="tab" data-tab="index">Index</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <div id="tab-capture" class="tab-content active">
      <div id="status">Ready</div>
      <div id="stats" hidden>
        <span id="endpoint-count">0</span> endpoints &middot;
        <span id="request-count">0</span> requests
        <div id="auth-status"></div>
      </div>
      <div id="controls">
        <button id="btn-start">Start Capture</button>
        <button id="btn-stop" hidden>Stop Capture</button>
      </div>
      <div id="export" hidden>
        <div id="endpoint-list"></div>
        <button id="btn-download">Download Skill File</button>
      </div>
      <div id="save-status" hidden></div>
    </div>

    <div id="tab-index" class="tab-content hidden">
      <div id="index-list"></div>
      <div id="index-empty" class="hidden">
        <p>No API traffic observed yet. Browse the web and endpoints will appear here.</p>
      </div>
    </div>

    <div id="tab-settings" class="tab-content hidden">
      <div class="setting-row">
        <label>
          <input type="checkbox" id="auto-learn-toggle">
          Auto-learn mode
        </label>
        <p class="setting-desc">Automatically capture API traffic when you revisit sites.</p>
      </div>
      <div class="setting-row">
        <label>
          Revisit threshold:
          <input type="number" id="revisit-threshold" min="2" max="20" value="3" class="input-narrow">
        </label>
        <p class="setting-desc">Number of visits before auto-capture triggers.</p>
      </div>
    </div>
  </div>
  <script src="dist/popup.js" type="module"></script>
</body>
</html>
